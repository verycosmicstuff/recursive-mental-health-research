<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategy Evolution History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
        .card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(51, 65, 85, 0.5); border-radius: 12px; padding: 24px; backdrop-filter: blur(12px); }
        .diff-line { display: block; padding: 0 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; line-height: 1.5; white-space: pre-wrap; }
        .diff-add { background: rgba(6, 78, 59, 0.4); color: #6ee7b7; border-left: 3px solid #10b981; }
        .diff-remove { background: rgba(153, 27, 27, 0.4); color: #fca5a5; border-left: 3px solid #ef4444; }
        .diff-context { color: #94a3b8; }
        .diff-hunk { background: rgba(15, 23, 42, 0.5); padding: 4px 0; border-bottom: 1px solid rgba(51, 65, 85, 0.3); margin-bottom: 2px; }
        .hunk-header { color: #6366f1; font-weight: 600; font-size: 0.75rem; background: rgba(30, 41, 59, 0.8); padding: 4px 12px; }
        .timeline-line { position: absolute; left: 1.5rem; top: 2rem; bottom: 0; width: 2px; background: linear-gradient(to bottom, #14b8a6, #6366f1); opacity: 0.3; }
        @media (max-width: 640px) { .timeline-line { left: 1rem; } }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-12">
        <header class="flex items-center gap-4 mb-12">
            <img src="favicon.png" alt="Brain Icon" class="w-12 h-12 rounded-lg shadow-lg shadow-teal-500/20">
            <div>
                <h1 class="text-3xl font-extrabold bg-gradient-to-r from-teal-400 to-indigo-400 text-transparent bg-clip-text">Strategy Evolution</h1>
                <p class="text-slate-400 mt-1">Timeline of autonomous research iterations</p>
            </div>
        </header>

        <div class="relative space-y-12">
            <div class="timeline-line"></div>
            <div id="history-container" class="space-y-12">
                <!-- Commits will be injected here -->
                <div class="flex items-center justify-center py-20">
                    <div class="w-12 h-12 border-4 border-teal-500/20 border-t-teal-500 rounded-full animate-spin"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadHistory() {
            try {
                const res = await fetch('data/history.json');
                const data = await res.json();
                renderHistory(data);
            } catch (err) {
                console.error(err);
                document.getElementById('history-container').innerHTML = `
                    <div class="card text-center py-12">
                        <span class="text-3xl mb-4 block">⚠️</span>
                        <h3 class="text-xl font-bold text-white mb-2">History data not found</h3>
                        <p class="text-slate-400">Run process_history.py to generate the history data.</p>
                    </div>`;
            }
        }

        function renderHistory(commits) {
            const container = document.getElementById('history-container');
            container.innerHTML = '';

            commits.forEach((c, idx) => {
                const card = document.createElement('div');
                card.className = 'relative pl-12 sm:pl-16 group';

                // Timeline Dot
                const dot = document.createElement('div');
                dot.className = `absolute left-0 top-1.5 w-12 sm:w-12 h-12 sm:h-12 flex items-center justify-center z-10`;
                dot.innerHTML = `
                    <div class="w-4 h-4 rounded-full bg-slate-900 border-2 border-teal-400 group-hover:scale-125 transition-transform"></div>
                `;
                card.appendChild(dot);

                const content = `
                    <div class="card overflow-hidden">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                            <div>
                                <div class="flex items-center gap-3 mb-1">
                                    <span class="px-2 py-0.5 bg-teal-500/10 text-teal-400 text-xs font-bold rounded border border-teal-500/20 font-mono">${c.hash}</span>
                                    <h2 class="text-lg font-bold text-white">${c.message || 'Updated Strategy'}</h2>
                                </div>
                                <p class="text-sm text-slate-400">${c.date}</p>
                            </div>
                        </div>

                        <div class="space-y-4">
                            ${c.hunks.map(h => `
                                <div class="rounded-lg overflow-hidden border border-slate-700/50">
                                    <div class="hunk-header font-mono">${h.header}</div>
                                    <div class="bg-slate-900/50 py-2">
                                        ${h.lines.map(l => `
                                            <span class="diff-line diff-${l.type}">${escapeHtml(l.content)}</span>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                card.innerHTML += content;
                container.appendChild(card);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadHistory();
    </script>
</body>
</html>
